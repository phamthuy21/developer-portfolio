name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: portfolio_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Test Env File
        run: |
          cd backend
          echo "DATABASE_URL=postgresql://postgres:password@localhost:5433/portfolio_test?schema=public" > .env.test
          echo "JWT_SECRET=ci-test-secret" >> .env.test
          echo "JWT_EXPIRATION=15m" >> .env.test
          echo "JWT_REFRESH_SECRET=ci-test-refresh-secret" >> .env.test
          echo "JWT_REFRESH_EXPIRATION=7d" >> .env.test

      - name: Run Prisma Migrations
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5433/portfolio_test?schema=public
        run: |
          cd backend
          pnpm prisma generate
          pnpm prisma migrate deploy

      - name: Lint
        run: pnpm run lint

      - name: Type Check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test (Unit, Integration, E2E)
        run: |
          cd backend
          pnpm test:cov
          pnpm test:integration
          pnpm test:e2e
